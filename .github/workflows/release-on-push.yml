# DO NOT EDIT: This file should only be modified in the `go-library-template` repo.

name: Create release on push to main branch

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: read
  actions: write # required for `workflow-dispatch` to trigger the automerge workflow

jobs:
  release_on_push:
    name: Create release on push to main branch
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Create release based on label
        uses: step-security/release-on-push-action@cb8d0f4644b90de8de1c49113ad7e66f13224c3d # v0.28.5
        with:
          bump_version_scheme: norelease
          use_github_release_notes: true
          dry_run: ${{ format('refs/heads/{0}', github.event.repository.default_branch) != github.ref }}

      - name: Checkout code # required for automerge
        if: format('refs/heads/{0}', github.event.repository.default_branch) != github.ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Automerge
        if: format('refs/heads/{0}', github.event.repository.default_branch) != github.ref
        uses: ./.github/actions/trigger-automerge
        with:
          event: ${{ toJSON(github.event) }}
          hasAutoApproverPrivateKey: ${{ secrets.AUTO_APPROVER_PRIVATE_KEY != '' }}
