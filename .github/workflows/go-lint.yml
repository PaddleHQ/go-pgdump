# DO NOT EDIT: This file should only be modified in the `go-library-template` repo.

name: Ensure go code passes linting rules

on:
  merge_group:
  pull_request:

env:
  # Required to enable support for synctest.Run
  # This will be removed once we update to go 1.25
  GOEXPERIMENT: synctest

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Required to check out the code
  pull-requests: write # Required to post a comment on the PR
  checks: write # Required to post a comment on the PR
  actions: write # required for `workflow-dispatch` to trigger the automerge workflow

jobs:
  lint:
    name: Ensure code passes linting rules
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          owner: ${{ github.repository_owner }}
          private: ${{ github.event.repository.private }}
          private-key: ${{ secrets.PRIVATE_GO_CI_PRIVATE_KEY }}

      - name: Read build config
        id: build_config
        uses: pietrobolcato/action-read-yaml@9f13718d61111b69f30ab4ac683e67a56d254e1d # v1.1.0
        with:
          config: ${{ github.workspace }}/build-config.yaml

      - name: Resolve base ref
        id: base
        run: |
          base_ref="${{ github.event.pull_request.base.ref || github.event.merge_group.base_ref }}"
          base_ref="${base_ref#refs/heads/}"
          merge_base=$(git merge-base "origin/${base_ref}" HEAD)
          echo "sha=$merge_base" >> "$GITHUB_OUTPUT"

      - name: Determine lint scope
        id: scope
        run: |
          base_sha="${{ steps.base.outputs.sha }}"
          if git diff --name-only "$base_sha"..HEAD | grep -qE '(^|/)\.golangci\.(yml|yaml)$'; then
            # Lint config changed — lint everything so new rules are enforced repo-wide.
            echo "pkgs=./..." >> "$GITHUB_OUTPUT"
            echo "new_from_rev=" >> "$GITHUB_OUTPUT"
          else
            pkgs=$(git diff --name-only --diff-filter=d "$base_sha"..HEAD -- '*.go' \
              | xargs -I{} dirname {} \
              | sort -u \
              | sed 's|^|./|' \
              | tr '\n' ' ')
            echo "pkgs=$pkgs" >> "$GITHUB_OUTPUT"
            echo "new_from_rev=--new-from-rev=$base_sha" >> "$GITHUB_OUTPUT"
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.5.0
          args: --timeout=${{ steps.build_config.outputs['lintTimeout'] || '5m' }} ${{ steps.scope.outputs.new_from_rev }} ${{ steps.scope.outputs.pkgs }}
          verify: false
          debug: cache

      - name: Automerge
        uses: ./.github/actions/trigger-automerge
        with:
          event: ${{ toJSON(github.event) }}
          hasAutoApproverPrivateKey: ${{ secrets.AUTO_APPROVER_PRIVATE_KEY != '' }}

  otel_cicd_export:
    name: OpenTelemetry Export Trace
    if: always()
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Export workflow trace
        uses: corentinmusard/otel-cicd-action@f2d88ecf54d9dd3e01ea95e25f93603212ee93d3 # v4.0.1
        continue-on-error: true
        with:
          otlpEndpoint: grpc://api.honeycomb.io:443/
          otlpHeaders: "x-honeycomb-team=${{ secrets.HONEYCOMB_GHA_SECRET }},x-honeycomb-dataset=${{ vars.HONEYCOMB_GHA_DATASET }}"
          githubToken: ${{ secrets.GITHUB_TOKEN }}
