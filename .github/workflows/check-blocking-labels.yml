# DO NOT EDIT: This file should only be modified in the `go-library-template` repo.
name: Check for blocking labels

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: write # required for `workflow-dispatch` to trigger the automerge workflow

env:
  BLOCKING_LABELS: do not merge,do-not-merge,wip,work in progress,work-in-progress,needs review,needs-review,draft,hold,blocked

jobs:
  check_blocking_labels:
    name: Check for blocking labels
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const blockingLabels = process.env.BLOCKING_LABELS.split(",");
            const blockingLabelsSet = new Set(blockingLabels);
            const { data: labelResultList } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const prLabels = labelResultList.map(label => label.name);
            const foundBlockingLabels = prLabels.filter(value => blockingLabelsSet.has(value));

            core.info(`Blocking labels: ${blockingLabels.join(" | ")}`);
            core.info(`PR labels: ${prLabels.join(" | ")}`);
            core.info(`Found blocking labels: ${foundBlockingLabels.join(" | ")}`);

            if (foundBlockingLabels.length > 0) {
              core.setFailed(`🚫 Merge blocked due to blocking label(s): ${foundBlockingLabels.join(", ")}`);
            } else {
              core.info("✅ No blocking labels found - merge allowed");
            }

      - name: Automerge
        uses: ./.github/actions/trigger-automerge
        with:
          event: ${{ toJSON(github.event) }}
          hasAutoApproverPrivateKey: ${{ secrets.AUTO_APPROVER_PRIVATE_KEY != '' }}

  otel_cicd_export:
    name: OpenTelemetry Export Trace
    if: always()
    needs: [check_blocking_labels]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Export workflow trace
        uses: corentinmusard/otel-cicd-action@f2d88ecf54d9dd3e01ea95e25f93603212ee93d3 # v4.0.1
        continue-on-error: true
        with:
          otlpEndpoint: grpc://api.honeycomb.io:443/
          otlpHeaders: "x-honeycomb-team=${{ secrets.HONEYCOMB_GHA_SECRET }},x-honeycomb-dataset=${{ vars.HONEYCOMB_GHA_DATASET }}"
          githubToken: ${{ secrets.GITHUB_TOKEN }}
